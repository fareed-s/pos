version: '3.8'

services:
  backend:
    build: ./backend
    container_name: pos-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - MONGO_URI=${MONGO_URI:-mongodb://mongo:27017/pos_system}
      - JWT_SECRET=${JWT_SECRET:-pos_system_jwt_secret_key_2024}
      - JWT_EXPIRES_IN=7d
      - COOKIE_MAX_AGE_DAYS=7
      - CLIENT_URL=http://localhost
      - SUPER_ADMIN_EMAIL=${SUPER_ADMIN_EMAIL:-superadmin@possystem.com}
      - SUPER_ADMIN_PASSWORD=${SUPER_ADMIN_PASSWORD:-SuperAdmin@123}
    depends_on:
      - mongo
    networks:
      - pos-network

  frontend:
    build: ./frontend
    container_name: pos-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - pos-network

  mongo:
    image: mongo:7
    container_name: pos-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - pos-network

volumes:
  mongo-data:

networks:
  pos-network:
    driver: bridge
