# Serves the Vite SPA + reverse-proxies /api and /uploads to the backend
# container on the same Docker network.

server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Hide the nginx version string from response headers.
    server_tokens off;

    # Body size — covers Excel bulk-upload + khata image / voice uploads (~8 MB cap).
    client_max_body_size 12M;

    # Docker's embedded DNS resolver. We use it together with a *variable*
    # proxy_pass below so nginx re-resolves `backend` on every request instead
    # of caching the upstream IP at startup. Without this, when the backend
    # container is recreated (gets a new internal IP) nginx keeps trying the
    # old IP forever and serves 502 "Host is unreachable" until the frontend
    # container itself is restarted. valid=30s caps how long a successful
    # lookup is cached before re-resolution.
    resolver 127.0.0.11 ipv6=off valid=30s;

    # SPA routing — every unknown path falls back to index.html so React Router works.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # PWA service worker — never cache, and Service-Worker-Allowed lets the SW
    # control the whole origin even though it's served from /sw.js.
    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Service-Worker-Allowed "/";
        try_files $uri =404;
    }

    # Manifest — revalidate so changes propagate quickly to installed PWAs.
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache";
        types { } default_type "application/manifest+json";
        try_files $uri =404;
    }

    # API → backend container. `$backend_host` is a variable (not a literal
    # hostname) which forces nginx to re-resolve via the resolver declared
    # above on every request — survives backend container recreation without
    # needing a frontend restart.
    location /api/ {
        set $backend_host backend;
        proxy_pass http://$backend_host:5000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_cache_bypass                 $http_upgrade;
        proxy_read_timeout 60s;
    }

    # Khata proof storage (image + voice uploads when Cloudinary isn't enabled).
    # Served by the backend's express.static, proxied here so the SPA can use
    # same-origin URLs like /uploads/<businessId>/khata/<file>.
    location /uploads/ {
        set $backend_host backend;
        proxy_pass http://$backend_host:5000$request_uri;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        # Aggressively cache uploaded media — filenames are timestamped, so the
        # bytes never change once written.
        proxy_cache_valid 200 7d;
        add_header Cache-Control "public, max-age=604800";
    }

    # Hashed Vite bundle assets — safe to cache for a year.
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Other static assets (favicons, fonts) — 30 day cache.
    location ~* \.(?:js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Compression for text-ish responses.
    gzip on;
    gzip_min_length 1024;
    gzip_comp_level 5;
    gzip_types text/plain text/css text/javascript application/javascript
               application/json application/xml application/manifest+json
               image/svg+xml;

    # Security headers — defaults that don't break inline-style usage.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(self), microphone=(self), geolocation=()" always;
}
